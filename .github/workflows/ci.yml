name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: reeln-dock

      # reeln-core is a path dependency (../../reeln-core from src-tauri/)
      # For private repos, add REELN_CORE_TOKEN secret with repo access
      - uses: actions/checkout@v4
        with:
          repository: StreamnDad/reeln-core
          path: reeln-core

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reeln-dock/src-tauri

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libavutil-dev libswscale-dev libswresample-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg pkg-config

      - name: Check formatting
        working-directory: reeln-dock/src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: reeln-dock/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: reeln-dock/src-tauri
        run: cargo test
