<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Minnesota -->
  <path fill="#0B3D2E" d="
    M120 60
    L260 60
    L300 90
    L360 100
    L420 120
    L440 160
    L400 200
    L380 240
    L360 280
    L300 300
    L260 320
    L220 300
    L180 280
    L150 240
    L120 200
    Z" />

  <!-- Reel -->
  <g transform="translate(220,180)">
    <circle cx="0" cy="0" r="60" fill="#111"/>
    <circle cx="0" cy="0" r="50" fill="#E9E9E9"/>
    <circle cx="0" cy="0" r="40" fill="#D22"/>

    <!-- Play -->
    <polygon points="-10,-15 -10,15 20,0" fill="#fff"/>

    <!-- Handle -->
    <rect x="55" y="-5" width="40" height="10" rx="5" fill="#111"/>
    <circle cx="100" cy="0" r="6" fill="#111"/>
  </g>

  <!-- Dock -->
  <g fill="#8B6B2E">
    <rect x="200" y="260" width="120" height="12"/>
    <rect x="210" y="272" width="10" height="30"/>
    <rect x="250" y="272" width="10" height="30"/>
    <rect x="290" y="272" width="10" height="30"/>
  </g>

  <!-- Water -->
  <path d="M120 300 Q200 280 280 300 T440 300" fill="#1E88C8"/>
  <path d="M120 310 Q200 290 280 310 T440 310" fill="#ffffff" opacity="0.6"/>

  <!-- Base -->
  <rect x="120" y="340" width="320" height="80" rx="20" fill="#0E1A22"/>

  <!-- Text -->
  <text x="160" y="390" font-size="48" font-family="Arial, Helvetica, sans-serif" fill="#ffffff">
    reel<tspan fill="#D22">n</tspan>
  </text>
  <text x="320" y="395" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#ffffff">
    dock
  </text>

</svg>
